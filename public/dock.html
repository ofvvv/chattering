<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Chattering Events</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  margin: 0;
  padding: 0;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#dock-window-container {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 8px;
  gap: 8px;
}
#dock-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  -webkit-app-region: drag;
}
#dock-titlebar button {
  -webkit-app-region: no-drag;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
}
#dock-titlebar button:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
}
#dock-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg-secondary);
  border-radius: 4px;
  padding: 6px;
}
#dock-inner {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.dock-empty {
  text-align: center;
  color: #999;
  font-size: 11px;
  padding: 20px;
}
.dock-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg-primary);
  border-radius: 3px;
  font-size: 11px;
  animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.dock-item.follow { border-left: 3px solid #9b9bf5; }
.dock-item.gift { border-left: 3px solid #ffcc00; }
.dock-icon {
  font-size: 14px;
  flex-shrink: 0;
}
.dock-user {
  font-weight: 700;
  color: #fff;
}
.dock-text {
  color: #ccc;
  font-size: 10px;
}
.dock-gift-img {
  width: 20px;
  height: 20px;
  object-fit: contain;
  margin-left: auto;
}
#dock-like-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  font-size: 11px;
}
.dock-like-color {
  font-size: 14px;
}
#dock-like-count {
  font-size: 13px;
  font-weight: 700;
  color: #ff6080;
}
</style>
</head>
<body>

<div id="dock-window-container">
  <div id="dock-titlebar">
    <span style="color:#fff;font-weight:600">📊 Eventos</span>
    <button onclick="redockWindow()" title="Volver a acoplar">↩ Acoplar</button>
  </div>

  <!-- EVENTOS SCROLL -->
  <div id="dock-scroll">
    <div id="dock-inner">
      <div id="dock-empty" class="dock-empty">Sin eventos aún</div>
    </div>
  </div>

  <!-- LIKES ROW -->
  <div id="dock-like-row">
    <span class="dock-like-color">❤</span>
    <span id="dock-like-count">0</span>
    <span style="font-size:11px;color:#999">likes</span>
  </div>
</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script>
const SERVER = 'http://localhost:3000'
const MAX_DOCK = 20
const dockLikeCount = new Map()

// Redock: notify main window to re-attach dock
async function redockWindow() {
  await window.electronAPI.redockDock()
  window.close()
}

// Add event to dock
function addToDock(type, user, text, img = null, silent = false) {
  const inner = document.getElementById('dock-inner')
  const empty = document.getElementById('dock-empty')
  if (empty) empty.remove()
  
  const item = document.createElement('div')
  item.className = `dock-item ${type}`
  
  const icon = type === 'follow' ? '👤' : '🎁'
  let html = `<span class="dock-icon">${icon}</span>`
  html += `<span class="dock-user">${user}</span>`
  html += `<span class="dock-text">${text}</span>`
  if (img) html += `<img src="${img}" class="dock-gift-img" alt="">`
  
  item.innerHTML = html
  inner.insertBefore(item, inner.firstChild)
  
  // Limit items
  while (inner.children.length > MAX_DOCK) {
    inner.removeChild(inner.lastChild)
  }
}

// Update like counter
function updateLikeRow(user, userId, count) {
  const current = dockLikeCount.get(userId) || 0
  dockLikeCount.set(userId, current + count)
  
  let total = 0
  dockLikeCount.forEach(v => total += v)
  document.getElementById('dock-like-count').textContent = total
}

// Socket connection
const socket = io(SERVER, { reconnectionDelay: 2000, reconnectionAttempts: 20 })

socket.on('connect', () => console.log('[Dock] Socket conectado'))

socket.on('dock_history', events => {
  events.forEach(d => {
    if (d.type === 'follow') addToDock('follow', d.user || d.username, ' te empezó a seguir', null, true)
    else if (d.type === 'gift') addToDock('gift', d.user || d.username, ` envió ${d.text}`, null, true)
  })
})

socket.on('evento', d => {
  if (d.type === 'like') {
    updateLikeRow(d.user, d.userId, d.count || 1)
  }
  else if (d.type === 'follow') {
    addToDock('follow', d.user, ' te empezó a seguir', null)
  }
  else if (d.type === 'gift' && d.plat !== 'TW') {
    addToDock('gift', d.user, ` envió ${d.text}${d.count > 1 ? ` x${d.count}` : ''}`, d.giftImg || null)
  }
  else if (d.type === 'sub' || d.type === 'resub' || (d.type === 'gift' && d.plat === 'TW')) {
    addToDock('gift', d.user, ` ${d.type === 'resub' ? 'resub' : 'se suscribió'}`, null)
  }
})

socket.on('likes_init', () => {})

console.log('[Dock] Ventana de eventos inicializada')
</script>

</body>
</html>
