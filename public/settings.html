<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chattering — Configuración</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar...">
            </div>
            <nav class="main-menu">
                <a href="#page-general" class="active">General</a>
                <a href="#page-accounts">Cuentas</a>
                <a href="#page-appearance">Apariencia</a>
                <a href="#page-chat">Chat</a>
                <a href="#page-emotes">Emotes</a>
            </nav>
        </aside>

        <main class="content">
            <div id="page-general" class="page">
                <h1>Configuración General</h1>
                <div class="setting-item">
                    <label for="autoupdate-checkbox">Buscar actualizaciones automáticamente</label>
                    <input type="checkbox" id="autoupdate-checkbox" data-config="autoUpdate">
                </div>
            </div>

            <div id="page-accounts" class="page" style="display: none;">
                <h1>Cuentas</h1>
                <div class="setting-item">
                    <label for="twitch-user-input">Usuario de Twitch</label>
                    <input type="text" id="twitch-user-input" data-config="twitchUser" placeholder="tu_canal">
                </div>
                <div class="setting-item">
                    <button id="twitch-auth-button">Conectar con Twitch</button>
                    <span id="twitch-auth-status"></span>
                </div>
            </div>

            <div id="page-appearance" class="page" style="display: none;">
                <h1>Apariencia</h1>
                <div class="setting-item">
                    <label for="theme-select">Tema</label>
                    <select id="theme-select" data-config="theme" data-preview="theme">
                        <option value="dark">Dark</option>
                        <option value="midnight">Midnight</option>
                        <option value="forest">Forest</option>
                        <option value="sakura">Sakura</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="compact-mode-checkbox">Modo Compacto</label>
                    <input type="checkbox" id="compact-mode-checkbox" data-config="compact" data-preview="compact">
                </div>
            </div>

            <div id="page-chat" class="page" style="display: none;">
                <h1>Chat</h1>
                <div class="setting-item">
                    <label for="font-size-slider">Tamaño de Fuente: <span id="font-size-value">14</span>px</label>
                    <input type="range" id="font-size-slider" data-config="fontSize" data-preview="fontSize" min="10" max="20" step="0.5">
                </div>
            </div>

            <div id="page-emotes" class="page" style="display: none;">
                <h1>Emotes</h1>
                <p>Configuración de emotes próximamente.</p>
            </div>

        </main>
    </div>

    <footer class="footer-bar">
        <button id="reset-button" class="btn-danger">Restaurar</button>
        <div class="footer-actions">
            <button id="cancel-button">Cancelar</button>
            <button id="save-button">Guardar</button>
        </div>
    </footer>

    <script src="js/settings/settings-helpers.js"></script>
    <script src="js/settings/settings-form.js"></script>
    <script src="js/settings/settings-ui.js"></script>
    <script src="js/settings/settings-accounts.js"></script>
    <script src="js/settings/settings-main.js"></script>
</body>
</html>
