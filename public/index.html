<!DOCTYPE html>
<html lang="es" class="win-main">
<head>
<meta charset="utf-8"><title>Chattering</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast"></div>

<div id="titlebar" ondblclick="return false">
  <div id="titlebar-left">
    <div id="app-title">Chatter<span>ing</span></div>
    <div id="viewer-count" title="Espectadores en vivo">
      <svg viewBox="0 0 16 16" fill="currentColor" width="9" height="9"><path d="M8 3a5 5 0 100 10A5 5 0 008 3zM1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" fill-rule="evenodd" clip-rule="evenodd"/><circle cx="8" cy="8" r="2"/></svg>
      <span id="viewer-num">0</span>
    </div>
  </div>
  <div id="tb-drag-zone" style="-webkit-app-region:drag;flex:1;height:100%;cursor:move"></div>
  <div id="titlebar-controls">
    <button class="win-btn" id="btn-search" onclick="toggleSearchBar()" title="Buscar (Ctrl+F)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="7.5" r="5"/><line x1="11" y1="11" x2="14" y2="14"/></svg>
    </button>
    <button class="win-btn" id="btn-filter" onclick="toggleFilterBar()" title="Filtros">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="4" x2="14" y2="4"/><line x1="4" y1="8" x2="12" y2="8"/><line x1="6" y1="12" x2="10" y2="12"/></svg>
    </button>
    <button class="win-btn" id="btn-settings" onclick="window.electronAPI.openSettings()" title="Configuración (,)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>
    </button>
    <button class="win-btn" onclick="window.electronAPI.minimize()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="3" y1="8" x2="13" y2="8"/></svg>
    </button>
    <button class="win-btn" onclick="window.electronAPI.maximize()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="8" height="8" rx="1"/></svg>
    </button>
    <button class="win-btn" id="btn-close" onclick="window.electronAPI.close()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
    </button>
  </div>
</div>

<div id="filter-bar">
  <button class="fchip fc-subs" id="fc-subs" onclick="toggleFilter('subs')">⭐ Subs</button>
  <button class="fchip fc-mods" id="fc-mods" onclick="toggleFilter('mods')">🛡 Mods</button>
  <button class="fchip fc-bots" id="fc-bots" onclick="toggleFilter('bots')">🤖 Sin bots</button>
  <button class="fchip fc-first" id="fc-first" onclick="toggleFilter('first')">🌟 First</button>
  <div style="width:1px;background:#1e1e24;margin:0 2px;align-self:stretch"></div>
  <button class="fchip fc-plat" id="fc-TT" onclick="toggleFilter('TT')"><svg viewBox="0 0 18 18" width="10" height="10"><rect width="18" height="18" rx="3" fill="#010101"/><path d="M12.1 4a3.2 3.2 0 01-2.5-2.8H7.7V11a1.9 1.9 0 01-1.9 1.7 1.9 1.9 0 01-1.9-1.9 1.9 1.9 0 011.9-1.9l.5.07V6.6a4.2 4.2 0 00-.5-.03A4.2 4.2 0 001.6 10.8a4.2 4.2 0 004.2 4.2 4.2 4.2 0 004.2-4.2V6.1a5.4 5.4 0 003.2 1V4.7a3.2 3.2 0 01-1.1-.7z" fill="#fff"/></svg> TT</button>
  <button class="fchip fc-plat" id="fc-YT" onclick="toggleFilter('YT')"><svg viewBox="0 0 18 18" width="10" height="10"><rect width="18" height="18" rx="3" fill="#FF0000"/><polygon points="7.5,6.5 7.5,11.5 12,9" fill="#fff"/></svg> YT</button>
  <button class="fchip fc-plat" id="fc-TW" onclick="toggleFilter('TW')"><svg viewBox="0 0 18 18" width="10" height="10"><rect width="18" height="18" rx="3" fill="#9147FF"/><path d="M4 2L3 4.8V14.6h3.8V16.5l2-1.9h2.8l4.4-4.4V2H4zm10.4 8.6L12 13H9.4L7.4 15V13H4.6V3.4H14.4V10.6zM11.4 5.4V9H10V5.4h1.4zm-3.4 0V9H6.6V5.4H8z" fill="#fff"/></svg> TW</button>
  <button class="fchip" id="fc-clear" onclick="clearFilters()">✕</button>
</div>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="Buscar mensajes..." autocomplete="off">
  <span id="search-count"></span>
  <button id="search-close" onclick="toggleSearchBar()">✕</button>
</div>

<div id="skeleton-overlay"><div id="sk-container"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div></div>

<div id="link-preview"><img id="lp-img" alt=""><div id="lp-title"></div><div id="lp-desc"></div><div id="lp-domain"></div></div>
<div id="emote-tooltip"><img id="et-img" alt=""><div id="et-name"></div><div id="et-platform"></div></div>

<div id="emote-ctx">
  <div class="ctx-name" id="ctx-emote-name">Emote</div><div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxCopyName()">📋 Copiar nombre</div>
  <div class="ctx-item" onclick="ctxCopyUrl()">🔗 Copiar link</div>
  <div class="ctx-item" onclick="ctxDownload()">⬇ Descargar</div><div class="ctx-sep"></div>
  <div class="ctx-item" onclick="closeEmoteCtx()">✕ Cerrar</div>
</div>

<div id="changelog-overlay">
    <div id="changelog-box">
        <div id="changelog-header">
            <div><div id="changelog-title">✨ Novedades</div><div id="changelog-version"></div></div>
            <button id="changelog-close-btn" onclick="closeChangelog()">✕</button>
        </div>
        <ul id="changelog-body"></ul>
    </div>
</div>

<div id="main-layout">
  <div id="top-dock">
    <div id="dock-resize-handle"></div>
    <div id="dock-scroll"><div id="dock-inner"><div id="dock-empty">Sin eventos aún</div></div></div>
  </div>

  <div id="chat-wrap">
    <div id="chat"></div>
    <div id="scroll-paused">▼ nuevos mensajes</div>
  </div>
</div>

<div id="reply-bar">
  <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M1 8l6-6v3.5c5 0 8 2 8 7.5-1.5-3.5-5-4.5-8-4.5V12L1 8z"/></svg>
  <div id="reply-preview">Respondiendo a <span id="reply-user"></span>: <span id="reply-text"></span></div>
  <button id="reply-cancel" onclick="cancelReply()" title="Cancelar respuesta">✕</button>
</div>

<div id="emote-picker"><input id="ep-search" type="text" placeholder="Buscar emote..." oninput="filterEmotePicker(this.value)"><div id="ep-grid"></div></div>

<div id="test-panel">
  <div id="test-panel-label">Test</div>
  <button class="test-btn" onclick="te('follow')">+ Follow</button>
  <button class="test-btn" onclick="te('gift')">+ Gift</button>
  <button class="test-btn" onclick="te('msg')">+ Msg</button>
  <button class="test-btn" onclick="te('like')">+ Like</button>
</div>

<div id="chat-input-bar">
  <select id="chat-plat-sel"><option value="TW">Twitch</option></select>
  <div style="flex:1;position:relative">
    <input id="chat-input-field" type="text" placeholder="Escribe un mensaje..." maxlength="500" autocomplete="off">
    <div id="chat-autocomplete"></div>
  </div>
  <button id="emote-picker-btn" title="Emotes" onclick="toggleEmotePicker()">😀</button>
  <button id="chat-send-btn" onclick="sendChatMsg()">↵</button>
</div>

<div id="bottom-dock">
  <div id="platform-icons">
    <div class="plat-status-icon" data-plat="TT" title="TikTok"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm6.1 7.6a4.7 4.7 0 01-2.7-.9v4a4.1 4.1 0 11-3.5-4.1h.4v2.2a2 2 0 101.5 1.9V6.9h2.1a2.6 2.6 0 002.2 2.2z"/></svg></div>
    <div class="plat-status-icon" data-plat="YT" title="YouTube"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 00-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4a3 3 0 00-2.1 2.1C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 002.1 2.1c1.9.4 9.4.4 9.4.4s7.5 0 9.4-.4a3 3 0 002.1-2.1c.5-1.9.5-5.5.5-5.5s0-3.6-.5-5.5z" fill="#FF0000"/><path d="M9.5 15.5l6.3-3.5-6.3-3.5v7z" fill="#fff"/></svg></div>
    <div class="plat-status-icon" data-plat="TW" title="Twitch"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.3 2L2 6v16h5.3v4h2.9l4-4h4.7l6.3-6.3V2zm17.7 13l-3.6 3.6h-6.1l-3.2 3.2v-3.2H5V4h17zM16 8v6h-2V8zm-5.3 0v6h-2V8z"/></svg></div>
  </div>
  <div id="status-text" style="margin-left:auto">NOT LIVE</div>
</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script>
const d=document,SERVER='http://localhost:3000',MAX_CHAT_NODES=150,MAX_DOCK=20;
let cfg={},msgLineCounter=0,currentReply={};
const emoteMap={},KNOWN_BOTS=['nightbot','streamelements','fossabot','moobot','wizebot','botrix','streamlabs','sery_bot'];
const TC=['#FF0000','#0000FF','#00FF00','#B22222','#FF7F50','#9ACD32','#FF4500','#2E8B57','#DAA520','#D2691E','#5F9EA0','#1E90FF','#FF69B4','#8A2BE2','#00FF7F'];

const getColor=s=>{if(!s)return TC[0];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return TC[Math.abs(h)%TC.length]};
const platIconSvg=p=>{const i={TT:'<rect width="18" height="18" rx="3" fill="#010101"/><path d="M12.1 4a3.2 3.2 0 01-2.5-2.8H7.7V11a1.9 1.9 0 01-1.9 1.7 1.9 1.9 0 01-1.9-1.9 1.9 1.9 0 011.9-1.9l.5.07V6.6a4.2 4.2 0 00-.5-.03A4.2 4.2 0 001.6 10.8a4.2 4.2 0 004.2 4.2 4.2 4.2 0 004.2-4.2V6.1a5.4 5.4 0 003.2 1V4.7a3.2 3.2 0 01-1.1-.7z" fill="#fff"/>',YT:'<rect width="18" height="18" rx="3" fill="#FF0000"/><polygon points="7.5,6.5 7.5,11.5 12,9" fill="#fff"/>',TW:'<rect width="18" height="18" rx="3" fill="#9147FF"/><path d="M4 2L3 4.8V14.6h3.8V16.5l2-1.9h2.8l4.4-4.4V2H4zm10.4 8.6L12 13H9.4L7.4 15V13H4.6V3.4H14.4V10.6zM11.4 5.4V9H10V5.4h1.4zm-3.4 0V9H6.6V5.4H8z" fill="#fff"/>'};return i[p]||i.TT};
const esc=s=>String(s||'').replace(/[&<>"'`]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'})[c]);
const openLink=url=>window.electronAPI?.openExternal(url)||window.open(url,'_blank');
const nextBg=()=>(++msgLineCounter)%2===0?'linea-bg-even':'linea-bg-odd';

// SOUND
let audioCtx=null;const getAudioCtx=()=>(audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)),audioCtx);function playTone(f=440,d=0.15,v=0.4,t='sine'){if(!cfg.soundsEnabled)return;try{const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type=t;const V=(cfg.soundVolume||60)/100*v;g.gain.setValueAtTime(V,c.currentTime);g.gain.exponentialRampToValueAtTime(1e-3,c.currentTime+d);o.start();o.stop(c.currentTime+d)}catch(e){}}function playFollow(){playTone(660,0.12,0.35);setTimeout(()=>playTone(880,0.1,0.25),120)}function playGift(){[523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,0.1,0.3),i*80))}function playMention(){playTone(440,0.08,0.2);setTimeout(()=>playTone(554,0.12,0.3),100)}

// UI FEEDBACK
function showToast(m,t=''){const e=d.getElementById('toast');e.textContent=m;e.className=`show${t?' toast-'+t:''}`;clearTimeout(e._t);e._t=setTimeout(()=>e.className='',3000)}

// CHANGELOG
async function checkChangelog(){try{const v=await window.electronAPI.getVersion(),l=await window.electronAPI.getLastSeenVersion();if(v!==l){const n=await window.electronAPI.getChangelog();d.getElementById('changelog-version').textContent=`v${v}`;d.getElementById('changelog-body').innerHTML=n.map(i=>`<li>${esc(i)}</li>`).join('');d.getElementById('changelog-overlay').classList.add('open')}}catch(e){console.warn('Changelog fetch failed',e)}}async function closeChangelog(){d.getElementById('changelog-overlay').classList.remove('open');const v=await window.electronAPI.getVersion();await window.electronAPI.setLastSeenVersion(v)}

// FILTERS & SEARCH
const activeFilters=new Set();function toggleFilterBar(){d.getElementById('filter-bar').classList.toggle('open')}function toggleFilter(t){activeFilters.has(t)?activeFilters.delete(t):activeFilters.add(t);d.getElementById('fc-'+t)?.classList.toggle('active',activeFilters.has(t));updateFilterButton();applySearchFilter()}function clearFilters(){activeFilters.clear();d.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));updateFilterButton();applySearchFilter()}function updateFilterButton(){d.getElementById('btn-filter')?.classList.toggle('has-filters',activeFilters.size>0)}function syncFilterChips(){d.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));activeFilters.forEach(f=>d.getElementById('fc-'+f)?.classList.add('active'));updateFilterButton()}
const searchInput=d.getElementById('search-input');function toggleSearchBar(){const b=d.getElementById('search-bar');b.classList.toggle('open');if(b.classList.contains('open')){searchInput.focus();searchInput.select()}else{searchInput.value='';applySearchFilter()}}searchInput.addEventListener('input',()=>applySearchFilter());function applySearchFilter(){const q=searchInput.value.toLowerCase();const c=d.getElementById('search-count');let n=0;d.querySelectorAll('#chat > .linea').forEach(e=>{const v=chipAllowsMsg(e.dataset)&&(!q||e.textContent.toLowerCase().includes(q));e.style.display=v?'':'none';if(v)n++});c.textContent=q?`${n} res.`:'';}
function chipAllowsMsg(dset){if(!dset)return!0;if(activeFilters.size===0)return!0;const data={user:dset.user,plat:dset.plat,badges:{sub:dset.sub==='true',mod:dset.mod==='true'},isFirst:dset.first==='true'};if(activeFilters.has('bots')&&KNOWN_BOTS.includes(data.user.toLowerCase()))return!1;const p=['TT','YT','TW'].filter(p=>activeFilters.has(p));if(p.length>0&&!p.includes(data.plat))return!1;const r=['subs','mods','first'].filter(r=>activeFilters.has(r));if(r.length>0){let h=!1;if(activeFilters.has('subs')&&data.badges.sub)h=!0;if(activeFilters.has('mods')&&data.badges.mod)h=!0;if(activeFilters.has('first')&&data.isFirst)h=!0;if(!h)return!1}return!0}

// LAYOUT & DOCK
function setDockPosition(p){d.getElementById('main-layout').classList.toggle('dock-bottom',p==='bottom')}function setDockHeight(h){d.getElementById('top-dock').style.height=h+'px'}function initDockResize(){const h=d.getElementById('dock-resize-handle'),o=d.getElementById('top-dock');if(!h||!o)return;let g=!1,y=0,H=0;h.addEventListener('mousedown',e=>{g=!0;y=e.clientY;H=o.offsetHeight;d.body.style.cursor='ns-resize';e.preventDefault()});d.addEventListener('mousemove',e=>{if(!g)return;const b=d.getElementById('main-layout').classList.contains('dock-bottom'),t=b?y-e.clientY:e.clientY-y;const nH=Math.max(40,Math.min(300,H+t));setDockHeight(nH);cfg.dockHeight=nH});d.addEventListener('mouseup',()=>g=!(d.body.style.cursor=''))}

// EMOTES
async function cargarEmotes(c){Object.keys(emoteMap).forEach(k=>delete emoteMap[k]);let t=null;if(c.twitchUser)try{if(c.twitchToken){const r=await fetch(`https://api.twitch.tv/helix/users?login=${c.twitchUser}`,{headers:{'Client-ID':'w2q6ngvevmf1gkuu1ngiqwmyzqmjrt','Authorization':`Bearer ${c.twitchToken.replace('oauth:','')}`}});const j=await r.json();if(j.data&&j.data.length>0)t=j.data[0].id}else{const r=await fetch(`https://decapi.me/twitch/id/${c.twitchUser}`);const i=(await r.text()).trim();if(i&&!isNaN(i)&&!i.includes('User not found'))t=i}}catch(e){}const s=[];if(c.show7tvGlobal!==!1)s.push(fetch('https://7tv.io/v3/emote-sets/global').then(r=>r.json()).then(d=>{d?.emotes?.forEach(e=>{emoteMap[e.name]={url:`https://cdn.7tv.app/emote/${e.id}/2x.webp`,zw:(e.flags&256)!==0,p:'7TV'}})}).catch(()=>{}));if(c.show7tvCanal!==!1&&t)s.push(fetch(`https://7tv.io/v3/users/twitch/${t}`).then(r=>r.ok?r.json():null).then(u=>{const i=u?.emote_set?.id;if(!i)return;return fetch(`https://7tv.io/v3/emote-sets/${i}`).then(r=>r.json()).then(d=>{d?.emotes?.forEach(e=>{emoteMap[e.name]={url:`https://cdn.7tv.app/emote/${e.id}/2x.webp`,zw:(e.flags&256)!==0,p:'7TV'}})})}).catch(()=>{}));if(c.showBttvGlobal!==!1)s.push(fetch('https://api.betterttv.net/3/cached/emotes/global').then(r=>r.json()).then(d=>{d?.forEach(e=>{emoteMap[e.code]={url:`https://cdn.betterttv.net/emote/${e.id}/2x`,zw:!1,p:'BTTV'}})}).catch(()=>{}));if(c.showBttvCanal!==!1&&t)s.push(fetch(`https://api.betterttv.net/3/cached/users/twitch/${t}`).then(r=>r.ok?r.json():null).then(d=>{if(!d)return;[...(d.channelEmotes||[]),...(d.sharedEmotes||[])].forEach(e=>{emoteMap[e.code]={url:`https://cdn.betterttv.net/emote/${e.id}/2x`,zw:!1,p:'BTTV'}})}).catch(()=>{}));if(c.showFfzGlobal!==!1)s.push(fetch('https://api.frankerfacez.com/v1/set/global').then(r=>r.json()).then(d=>{Object.values(d?.sets||{}).forEach(s=>{s.emoticons?.forEach(e=>{emoteMap[e.name]={url:`https:${Object.values(e.urls)[1]||Object.values(e.urls)[0]}`,zw:!1,p:'FFZ'}})})}).catch(()=>{}));if(c.showFfzCanal!==!1&&c.twitchUser)s.push(fetch(`https://api.frankerfacez.com/v1/room/${c.twitchUser.toLowerCase()}`).then(r=>r.ok?r.json():null).then(d=>{if(!d)return;Object.values(d?.sets||{}).forEach(s=>{s.emoticons?.forEach(e=>{emoteMap[e.name]={url:`https:${Object.values(e.urls)[1]||Object.values(e.urls)[0]}`,zw:!1,p:'FFZ'}})})}).catch(()=>{}));await Promise.allSettled(s);console.log(`[Emotes] Cargados ${Object.keys(emoteMap).length} emotes`)}
function parseEmotes(t,e,p,y){if(!t)return'';let o=[{type:'text',content:t}];if(p==='TW'&&e){const n=[];for(const[i,s]of Object.entries(e))for(const a of s){const[l,c]=a.split('-').map(Number),d=t.substring(l,c+1);n.push({name:d,start:l,end:c,id:i})}n.sort((a,b)=>a.start-b.start);let i=0;const s=[];for(const a of n){a.start>i&&s.push({type:'text',content:t.substring(i,a.start)});s.push({type:'emote',html:`<img src="https://static-cdn.jtvnw.net/emoticons/v2/${a.id}/default/dark/2.0" class="emote" alt="${esc(a.name)}" data-platform="Twitch" data-emote="${esc(a.name)}" data-url="https://static-cdn.jtvnw.net/emoticons/v2/${a.id}/default/dark/2.0">`});i=a.end+1}i<t.length&&s.push({type:'text',content:t.substring(i)});o=s}if(p==='YT'&&y){let n=0;const i=[];[...y].sort((a,b)=>t.indexOf(a.placeholder)-t.indexOf(b.placeholder)).forEach(s=>{let a=0;while((a=t.indexOf(s.placeholder,a))!==-1){a>n&&i.push({type:'text',content:t.substring(n,a)});i.push({type:'emote',html:`<img src="${s.url}" class="emote" alt="${esc(s.name)}" data-platform="YouTube" data-emote="${esc(s.name)}" data-url="${s.url}">`});n=a+s.placeholder.length;a+=s.placeholder.length}});n<t.length&&i.push({type:'text',content:t.substring(n)});o=i}const n=[];Object.keys(emoteMap).sort((a,b)=>b.length-a.length);for(const s of o){if(s.type==='emote'){n.push(s);continue}let a=s.content;const r=Object.keys(emoteMap).filter(k=>a.includes(k)).sort((k1,k2)=>k2.length-k1.length);r.forEach(k=>{const d=emoteMap[k];const h=new RegExp(`\\b${k}\\b`,'g');a=a.replace(h,`<img src="${esc(d.url)}" class="emote${d.zw?' zw':''}" alt="${esc(k)}" data-platform="${esc(d.p||'')}" data-emote="${esc(k)}" data-url="${esc(d.url)}">`)});n.push({type:'text',content:a})}return n.map(t=>t.type==='emote'?t.html:esc(t.content)).join('').replace(/https?:\/\/[\\w-.~:/?#[\\]@!$&'()*+,;=]+/g,m=>`<a href="#" class="chat-link" onclick="openLink('${esc(m)}')" data-href="${esc(m)}">${m}</a>`)}

// EMOTE UI
