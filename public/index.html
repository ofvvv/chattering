<!DOCTYPE html>
<html lang="es" class="win-main">
<head>
<meta charset="utf-8"><title>Chattering</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/main/layout.css">
<link rel="stylesheet" href="css/main/chat.css">
<link rel="stylesheet" href="css/main/input.css">
<link rel="stylesheet" href="css/main/dock.css">
<link rel="stylesheet" href="css/main/overlays.css">
<link rel="stylesheet" href="css/main/filters.css">
</head>
<body>

<div id="toast"></div>

<div id="titlebar" ondblclick="return false">
  <div id="titlebar-left">
    <div id="app-title" style="-webkit-user-select: none; user-select: none;">Chatter<span>ing</span></div>
    <div id="viewer-count" title="Espectadores en vivo" style="display: none;">
      <svg viewBox="0 0 16 16" fill="currentColor" width="9" height="9"><path d="M8 3a5 5 0 100 10A5 5 0 008 3zM1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" fill-rule="evenodd" clip-rule="evenodd"/><circle cx="8" cy="8" r="2"/></svg>
      <span id="viewer-num">0</span>
    </div>
  </div>
  <div id="tb-drag-zone" style="-webkit-app-region:drag;flex:1;height:100%;cursor:move"></div>
  <div id="titlebar-controls">
    <button class="win-btn" id="btn-filter" onclick="toggleFilterBar()" title="Filtros">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="4" x2="14" y2="4"/><line x1="4" y1="8" x2="12" y2="8"/><line x1="6" y1="12" x2="10" y2="12"/>
      </svg>
    </button>
    <button class="win-btn" id="btn-settings" onclick="window.electronAPI.openSettings()" title="Configuración (,) ">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="2.5"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/>
      </svg>
    </button>
    <button class="win-btn" onclick="window.electronAPI.minimize()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="3" y1="8" x2="13" y2="8"/></svg>
    </button>
    <button class="win-btn" onclick="window.electronAPI.maximize()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="8" height="8" rx="1"/></svg>
    </button>
    <button class="win-btn" id="btn-close" onclick="window.electronAPI.close()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- FILTER BAR -->
<div id="filter-bar">
  <button class="fchip fc-subs" id="fc-subs" onclick="toggleFilter('subs')">⭐ Subs</button>
  <button class="fchip fc-mods" id="fc-mods" onclick="toggleFilter('mods')">🛡 Mods</button>
  <button class="fchip fc-bots" id="fc-bots" onclick="toggleFilter('bots')">🤖 Sin bots</button>
  <button class="fchip fc-first" id="fc-first" onclick="toggleFilter('first')">🌟 First</button>
  <div style="width:1px;background:#1e1e24;margin:0 2px;align-self:stretch"></div>
  <button class="fchip fc-plat" id="fc-TT" onclick="toggleFilter('TT')"><svg viewBox="0 0 18 18" width="10" height="10" style="display:inline;vertical-align:middle"><rect width="18" height="18" rx="3" fill="#010101"/><path d="M12.1 4a3.2 3.2 0 01-2.5-2.8H7.7V11a1.9 1.9 0 01-1.9 1.7 1.9 1.9 0 01-1.9-1.9 1.9 1.9 0 011.9-1.9l.5.07V6.6a4.2 4.2 0 00-.5-.03A4.2 4.2 0 001.6 10.8a4.2 4.2 0 004.2 4.2 4.2 4.2 0 004.2-4.2V6.1a5.4 5.4 0 003.2 1V4.7a3.2 3.2 0 01-1.1-.7z" fill="#fff"/></svg> TT</button>
  <button class="fchip fc-plat" id="fc-YT" onclick="toggleFilter('YT')"><svg viewBox="0 0 18 18" width="10" height="10" style="display:inline;vertical-align:middle"><rect width="18" height="18" rx="3" fill="#FF0000"/><polygon points="7.5,6.5 7.5,11.5 12,9" fill="#fff"/></svg> YT</button>
  <button class="fchip fc-plat" id="fc-TW" onclick="toggleFilter('TW')"><svg viewBox="0 0 18 18" width="10" height="10" style="display:inline;vertical-align:middle"><rect width="18" height="18" rx="3" fill="#9147FF"/><path d="M4 2L3 4.8V14.6h3.8V16.5l2-1.9h2.8l4.4-4.4V2H4zm10.4 8.6L12 13H9.4L7.4 15V13H4.6V3.4H14.4V10.6zM11.4 5.4V9H10V5.4h1.4zm-3.4 0V9H6.6V5.4H8z" fill="#fff"/></svg> TW</button>
  <button class="fchip" id="fc-clear" onclick="clearFilters()" style="color:#333;margin-left:auto">✕</button>
</div>

<!-- SEARCH BAR -->
<div id="search-bar">
  <input id="search-input" type="text" placeholder="Buscar mensajes..." autocomplete="off">
  <span id="search-count"></span>
  <button id="search-close" onclick="closeSearch()">✕</button>
</div>

<!-- SKELETON -->
<div id="skeleton-overlay">
  <div id="sk-container">
    <div class="sk-line sk-wide"></div><div class="sk-line sk-medium"></div>
    <div class="sk-line sk-short"></div><div class="sk-line sk-wide"></div>
    <div class="sk-line sk-medium"></div><div class="sk-line sk-short"></div>
  </div>
</div>

<!-- LINK PREVIEW -->
<div id="link-preview"><img id="lp-img" alt=""><div id="lp-title"></div><div id="lp-desc"></div><div id="lp-domain"></div></div>

<!-- EMOTE TOOLTIP -->
<div id="emote-tooltip"><img id="et-img" alt=""><div id="et-name"></div><div id="et-platform"></div></div>

<!-- EMOTE CONTEXT MENU -->
<div id="emote-ctx">
  <div class="ctx-name" id="ctx-emote-name">Emote</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxCopyName()">📋 Copiar nombre</div>
  <div class="ctx-item" onclick="ctxCopyUrl()">🔗 Copiar link</div>
  <div class="ctx-item" onclick="ctxDownload()">⬇ Descargar</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="closeEmoteCtx()">✕ Cerrar</div>
</div>

<!-- CHANGELOG -->
<div id="changelog-overlay">
    <div id="changelog-box">
        <div id="changelog-header">
            <div>
                <div id="changelog-title">✨ Novedades</div>
                <div id="changelog-version"></div>
            </div>
            <button id="changelog-close-btn" onclick="closeChangelog()">✕</button>
        </div>
        <div id="changelog-body"></div>
    </div>
</div>


<!-- MAIN LAYOUT -->
<div id="main-layout">
  <!-- DOCK (events) -->
  <div id="top-dock">
    <div id="dock-resize-handle"></div>
    <div id="dock-scroll">
      <div id="dock-inner">
        <div id="dock-empty" class="dock-empty">Sin eventos aún</div>
      </div>
    </div>
    <div id="dock-like-row">
      <span class="dock-like-color" style="font-size:14px">❤</span>
      <span id="dock-like-user" class="dock-user dock-like-color"></span>
      <span id="dock-like-action" class="dock-action"></span>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div id="chat-wrap">
    <div id="chat"></div>
    <div id="scroll-paused">▼ nuevos mensajes</div>
  </div>
</div>

<!-- REPLY BAR -->
<div id="reply-bar">
  <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0;color:#9b9bf5"><path d="M1 8l6-6v3.5c5 0 8 2 8 7.5-1.5-3.5-5-4.5-8-4.5V12L1 8z"/></svg>
  <div id="reply-preview">Respondiendo a <span id="reply-user"></span>: <span id="reply-text"></span></div>
  <button id="reply-cancel" onclick="cancelReply()" title="Cancelar respuesta">✕</button>
</div>

<!-- EMOTE PICKER (attached to chat input) -->
<div id="emote-picker">
  <input id="ep-search" type="text" placeholder="Buscar emote..." oninput="filterEmotePicker(this.value)">
  <div id="ep-grid"></div>
</div>

<div id="test-panel">
  <div id="test-panel-label">Test</div>
  <button class="test-btn" style="background:#9b9bf5;color:#000" onclick="te('follow')">+ Follow</button>
  <button class="test-btn" style="background:#ffcc00;color:#000" onclick="te('gift')">+ Gift</button>
  <button class="test-btn" style="background:#333;color:#fff" onclick="te('msg')">+ Msg</button>
  <button class="test-btn" style="background:#ff2b54;color:#fff" onclick="te('like')">+ Like</button>
</div>

<!-- CHAT INPUT (above status bar) -->
<div id="chat-input-bar">
  <select id="chat-plat-sel">
    <option value="TW">Twitch</option>
  </select>
  <div style="flex:1;position:relative">
    <input id="chat-input-field" type="text" placeholder="Escribe un mensaje... (:emote  /comando)" maxlength="500" autocomplete="off">
    <div id="chat-autocomplete"></div>
  </div>
  <button id="emote-picker-btn" title="Emotes" onclick="toggleEmotePicker()" style="background:#1a1a1e;border:1px solid #2e2e35;color:#888;border-radius:3px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">😀</button>
  <button id="chat-send-btn" onclick="sendChatMsg()">↵</button>
</div>

<div id="bottom-dock">
  <div id="platform-icons">
    <div class="plat-status-icon" data-plat="TT" title="TikTok">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm6.1 7.6a4.7 4.7 0 01-2.7-.9v4a4.1 4.1 0 11-3.5-4.1h.4v2.2a2 2 0 101.5 1.9V6.9h2.1a2.6 2.6 0 002.2 2.2z"/></svg>
    </div>
    <div class="plat-status-icon" data-plat="YT" title="YouTube">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 00-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4a3 3 0 00-2.1 2.1C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 002.1 2.1c1.9.4 9.4.4 9.4.4s7.5 0 9.4-.4a3 3 0 002.1-2.1c.5-1.9.5-5.5.5-5.5s0-3.6-.5-5.5z" fill="#FF0000"/><path d="M9.5 15.5l6.3-3.5-6.3-3.5v7z" fill="#fff"/></svg>
    </div>
    <div class="plat-status-icon" data-plat="TW" title="Twitch">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.3 2L2 6v16h5.3v4h2.9l4-4h4.7l6.3-6.3V2zm17.7 13l-3.6 3.6h-6.1l-3.2 3.2v-3.2H5V4h17zM16 8v6h-2V8zm-5.3 0v6h-2V8z"/></svg>
    </div>
  </div>
  <div id="status-text" style="margin-left:auto">NOT LIVE</div>
</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="js/main/globals.js"></script>
<script src="js/main/sound-handling.js"></script>
<script src="js/main/emote-handling.js"></script>
<script src="js/main/layout.js"></script>
<script src="js/main/dock.js"></script>
<script src="js/main/chat-rendering.js"></script>
<script src="js/main/chat-input.js"></script>
<script src="js/main/socket-handling.js"></script>
<!-- El orquestador principal se carga al final -->
<script src="js/main/main-app.js"></script>

<script>
  // Llamada segura para inicializar la aplicación
  document.addEventListener('DOMContentLoaded', () => {
    init();
  });
</script>

</body>
</html>
