<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script>
const SERVER='http://localhost:3000'
let cfg={},totalMsgCount=0,msgLineCounter=0
const emoteMap={}
const dockLikeCount=new Map(),MAX_DOCK=20
const MAX_CHAT_NODES=150
const TC=['#FF0000','#0000FF','#00FF00','#B22222','#FF7F50','#9ACD32','#FF4500','#2E8B57','#DAA520','#D2691E','#5F9EA0','#1E90FF','#FF69B4','#8A2BE2','#00FF7F']
const KNOWN_BOTS=['nightbot','streamelements','fossabot','moobot','wizebot','botrix','streamlabs','sery_bot','stay_hydrated_bot']

const getColor=s=>{if(!s)return TC[0];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return TC[Math.abs(h)%TC.length]}
const platIconSvg=spl=>{const icons={TT:'<rect width="18" height="18" rx="3" fill="#010101"/><path d="M12.1 4a3.2 3.2 0 01-2.5-2.8H7.7V11a1.9 1.9 0 01-1.9 1.7 1.9 1.9 0 01-1.9-1.9 1.9 1.9 0 011.9-1.9l.5.07V6.6a4.2 4.2 0 00-.5-.03A4.2 4.2 0 001.6 10.8a4.2 4.2 0 004.2 4.2 4.2 4.2 0 004.2-4.2V6.1a5.4 5.4 0 003.2 1V4.7a3.2 3.2 0 01-1.1-.7z" fill="#fff"/>',YT:'<rect width="18" height="18" rx="3" fill="#FF0000"/><polygon points="7.5,6.5 7.5,11.5 12,9" fill="#fff"/>',TW:'<rect width="18" height="18" rx="3" fill="#9147FF"/><path d="M4 2L3 4.8V14.6h3.8V16.5l2-1.9h2.8l4.4-4.4V2H4zm10.4 8.6L12 13H9.4L7.4 15V13H4.6V3.4H14.4V10.6zM11.4 5.4V9H10V5.4h1.4zm-3.4 0V9H6.6V5.4H8z" fill="#fff"/>'};return icons[spl]||icons.TT}
const esc=s=>String(s??'').replace(/[&<>"'`]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'}[c]))
const openLink=url=>window.electronAPI?.openExternal(url)||window.open(url,'_blank')
const nextBg=even=>{msgLineCounter++;return msgLineCounter%2===0?'linea-bg-even':'linea-bg-odd'}

// ── SOUND ─────────────────────────────────────────────────────────────────────
let audioCtx = null
function getAudioCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx }
function playTone(freq=440, dur=0.15, vol=0.4, type='sine') {
    if(!cfg.soundsEnabled) return
    try {
        const ctx=getAudioCtx(), osc=ctx.createOscillator(), gain=ctx.createGain()
        osc.connect(gain); gain.connect(ctx.destination)
        osc.frequency.value=freq; osc.type=type
        const v=(cfg.soundVolume||60)/100*vol
        gain.gain.setValueAtTime(v, ctx.currentTime)
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur)
        osc.start(); osc.stop(ctx.currentTime+dur)
    } catch(e){}
}
function playFollow()  { playTone(660,0.12,0.35); setTimeout(()=>playTone(880,0.1,0.25),120) }
function playGift()    { [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,0.1,0.3),i*80)) }
function playMention() { playTone(440,0.08,0.2); setTimeout(()=>playTone(554,0.12,0.3),100) }
function testSound(type) {
    const prev=cfg.soundsEnabled; cfg.soundsEnabled=true
    if(type==='follow') playFollow()
    else if(type==='gift') playGift()
    else playMention()
    cfg.soundsEnabled=prev
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg,type=''){
    const t=document.getElementById('toast')
    t.textContent=msg; t.className=`show${type?' toast-'+type:''}`
    clearTimeout(t._t); t._t=setTimeout(()=>t.className='',3000)
}

// ── CHANGELOG ─────────────────────────────────────────────────────────────────
async function checkChangelog() {
    const version = await window.electronAPI.getVersion()
    const lastSeen = await window.electronAPI.getLastSeenVersion()
    document.getElementById('changelog-version').textContent=`Chattering v${version}`
    if(lastSeen !== version) {
        document.getElementById('changelog-overlay').classList.add('open')
    }
}
async function closeChangelog() {
    document.getElementById('changelog-overlay').classList.remove('open')
    const version = await window.electronAPI.getVersion()
    await window.electronAPI.setLastSeenVersion(version)
}

// ── FILTER CHIPS (multi-select) ──────────────────────────────────────────────
const activeFilters = new Set()

function toggleFilterBar() {
    const bar = document.getElementById('filter-bar')
    bar.classList.toggle('open')
}
function toggleFilter(type) {
    if(activeFilters.has(type)) activeFilters.delete(type)
    else activeFilters.add(type)
    document.getElementById('fc-'+type)?.classList.toggle('active', activeFilters.has(type))
    updateFilterButton()
}
function clearFilters() {
    activeFilters.clear()
    document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'))
    updateFilterButton()
}
function updateFilterButton() {
    document.getElementById('btn-filter')?.classList.toggle('has-filters', activeFilters.size > 0)
}
function syncFilterChips() {
    document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'))
    activeFilters.forEach(f=>document.getElementById('fc-'+f)?.classList.add('active'))
    updateFilterButton()
}
function chipAllowsMsg(d) {
    if(activeFilters.size === 0) return true;

    if(activeFilters.has('bots') && KNOWN_BOTS.includes((d.user||'').toLowerCase())) return false;

    const platFilters = ['TT','YT','TW'].filter(p => activeFilters.has(p));
    if(platFilters.length > 0 && !platFilters.includes(d.plat)) return false;

    const roleFilters = ['subs', 'mods', 'first'].filter(r => activeFilters.has(r));
    if(roleFilters.length > 0) {
        let hasRole = false;
        if(activeFilters.has('subs') && d.badges?.sub) hasRole = true;
        if(activeFilters.has('mods') && d.badges?.mod) hasRole = true;
        if(activeFilters.has('first') && d.isFirst) hasRole = true;
        
        if(!hasRole) return false;
    }

    return true;
}

// ── LAYOUT ────────────────────────────────────────────────────────────────────
function setDockPosition(pos) {
    document.getElementById('main-layout').classList.toggle('dock-bottom',pos==='bottom')
}
;(function initDockResize(){
    const handle=document.getElementById('dock-resize-handle'),dock=document.getElementById('top-dock')
    let dragging=false,startY=0,startH=0
    handle.addEventListener('mousedown',e=>{dragging=true;startY=e.clientY;startH=dock.offsetHeight;document.body.style.cursor='ns-resize';e.preventDefault()})
    document.addEventListener('mousemove',e=>{
        if(!dragging)return
        const isBottom=document.getElementById('main-layout').classList.contains('dock-bottom')
        const delta=isBottom?startY-e.clientY:e.clientY-startY
        dock.style.height=Math.max(40,Math.min(240,startH+delta))+'px'
    })
    document.addEventListener('mouseup',()=>{dragging=false;document.body.style.cursor=''})
})()

// ── EMOTES ────────────────────────────────────────────────────────────────────
async function cargarEmotes(config) {
    Object.keys(emoteMap).forEach(key => delete emoteMap[key]);
    const statusEl = document.getElementById('emote-status');
    if (statusEl) statusEl.textContent = 'Cargando emotes...';

    let twitchId = null;
    if (config.twitchUser) {
        try {
            const r = await fetch(`https://decapi.me/twitch/id/${config.twitchUser}`);
            const id = (await r.text() || '').trim();
            if (id && !id.includes('User not found')) twitchId = id;
            console.log(`[Emotes] Twitch User ID: ${twitchId}`);
        } catch (e) { console.warn('[Emotes] Error fetching Twitch ID', e); }
    }

    const tasks =[];
    if (config.show7tvGlobal !== false) tasks.push(fetch('https://7tv.io/v3/emote-sets/global').then(r=>r.json()).then(d=>{d?.emotes?.forEach(e=>{emoteMap[e.name]={url:`https://cdn.7tv.app/emote/${e.id}/2x.webp`,zw:(e.flags&256)!==0,platform:'7TV'}})}).catch(e=>console.warn('7TV Global failed', e)));
    if (config.show7tvCanal !== false && twitchId) tasks.push(fetch(`https://7tv.io/v3/users/twitch/${twitchId}`).then(r=>r.ok?r.json():null).then(u=>{const sid=u?.emote_set?.id;if(!sid)return;return fetch(`https://7tv.io/v3/emote-sets/${sid}`).then(r=>r.json()).then(d=>{d?.emotes?.forEach(e=>{emoteMap[e.name]={url:`https://cdn.7tv.app/emote/${e.id}/2x.webp`,zw:(e.flags&256)!==0,platform:'7TV'}})})}).catch(e=>console.warn('7TV Channel failed', e)));
    if (config.showBttvGlobal !== false) tasks.push(fetch('https://api.betterttv.net/3/cached/emotes/global').then(r=>r.json()).then(d=>{d?.forEach(e=>{emoteMap[e.code]={url:`https://cdn.betterttv.net/emote/${e.id}/2x`,zw:false,platform:'BTTV'}})}).catch(e=>console.warn('BTTV Global failed', e)));
    if (config.showBttvCanal !== false && twitchId) tasks.push(fetch(`https://api.betterttv.net/3/cached/users/twitch/${twitchId}`).then(r=>r.ok?r.json():null).then(d=>{if(!d)return;[...(d.channelEmotes||[]),...(d.sharedEmotes||[])].forEach(e=>{emoteMap[e.code]={url:`https://cdn.betterttv.net/emote/${e.id}/2x`,zw:false,platform:'BTTV'}})}).catch(e=>console.warn('BTTV Channel failed', e)));
    if (config.showFfzGlobal !== false) tasks.push(fetch('https://api.frankerfacez.com/v1/set/global').then(r=>r.json()).then(d=>{Object.values(d?.sets||{}).forEach(s=>{s.emoticons?.forEach(e=>{emoteMap[e.name]={url:`https:${Object.values(e.urls)[0]}`,zw:false,platform:'FFZ'}})})}).catch(e=>console.warn('FFZ Global failed', e)));
    if (config.showFfzCanal !== false && config.twitchUser) tasks.push(fetch(`https://api.frankerfacez.com/v1/room/${config.twitchUser.toLowerCase()}`).then(r=>r.ok?r.json():null).then(d=>{if(!d)return;Object.values(d?.sets||{}).forEach(s=>{s.emoticons?.forEach(e=>{emoteMap[e.name]={url:`https:${Object.values(e.urls)[0]}`,zw:false,platform:'FFZ'}})})}).catch(e=>console.warn('FFZ Channel failed', e)));

    await Promise.allSettled(tasks);
    const total = Object.keys(emoteMap).length;
    console.log(`[Emotes] Loaded ${total} custom emotes.`);
    if (statusEl) statusEl.textContent = total > 0 ? `✓ ${total} emotes cargados` : (twitchId ? '⚠ Sin emotes en el canal' : '⚠ Configura Twitch primero');
}

function linkifyWord(w) {
    if(/^https?:\/\//i.test(w)) {
        const eu = esc(w);
        return `<a class="chat-link" href="#" data-href="${eu}" onclick="return false">${eu}</a>`;
    }
    if(/^[\w-]+\.(tv|com|net|org|gg|io|app|live|co)([/?#]\S*)?$/i.test(w)) {
        const eu = esc(w);
        const full = esc('https://'+w);
        return `<a class="chat-link" href="#" data-href="${full}" onclick="return false">${eu}</a>`;
    }
    return esc(w); 
}

function parseEmotes(text, twitchEmotes, plat, ytEmotes) {
    if (!text) return '';

    let final_text = text;
    let replacements = [];

    // 1. YouTube emotes (direct URL)
    if (plat === 'YT' && ytEmotes && ytEmotes.length > 0) {
        ytEmotes.forEach(e => {
            final_text = final_text.replace(e.placeholder, `<img src="${e.url}" class="emote" alt="${esc(e.name)}" title="${esc(e.name)}" data-platform="YouTube">`);
        });
    }

    // 2. Twitch native emotes
    if (plat === 'TW' && twitchEmotes && Object.keys(twitchEmotes).length > 0) {
        for (const [emoteId, positions] of Object.entries(twitchEmotes)) {
            for (const pos of positions) {
                const [start, end] = pos.split('-').map(Number);
                const name = text.substring(start, end + 1);
                replacements.push({ name, url: `https://static-cdn.jtvnw.net/emoticons/v2/${emoteId}/default/dark/2.0`, platform: 'Twitch' });
            }
        }
    }

    // 3. 7TV, BTTV, FFZ emotes
    if (plat === 'TW') {
        const words = text.split(' ');
        words.forEach(word => {
            const e = emoteMap[word];
            if (e) {
                replacements.push({ name: word, url: e.url, platform: e.platform, zw: e.zw });
            }
        });
    }

    // Replace all found emotes, avoiding duplicates
    const uniqueReplacements = Array.from(new Map(replacements.map(item => [item.name, item])).values());
    uniqueReplacements.forEach(e => {
        const imgTag = `<img src="${esc(e.url)}" class="emote${e.zw ? ' zw' : ''}" alt="${esc(e.name)}" title="${esc(e.name)}" data-platform="${esc(e.platform || '')}">`;
        final_text = final_text.split(e.name).join(imgTag);
    });
    
    // 4. Linkify what's left
    const words = final_text.split(' ');
    const processedWords = words.map(w => {
        if (w.startsWith('<img')) return w; // It's already an emote
        return linkifyWord(w);
    });

    return processedWords.join(' ');
}

let searchActive=false, searchResults=[], searchIndex=0

function openSearch() {
    searchActive=true
    document.getElementById('search-bar').classList.add('open')
    document.getElementById('search-input').focus()
}
function closeSearch() {
    searchActive=false
    document.getElementById('search-bar').classList.remove('open')
    document.getElementById('search-input').value=''
    clearSearchHighlights()
    document.getElementById('search-count').textContent=''
}
function clearSearchHighlights() {
    document.querySelectorAll('.search-match,.search-match-current').forEach(el=>{
        el.classList.remove('search-match','search-match-current')
    })
    searchResults=[]
}
function runSearch(query) {
    clearSearchHighlights()
    if(!query.trim()){document.getElementById('search-count').textContent='';return}
    const q=query.trim().toLowerCase()
    const lines=[...document.querySelectorAll('#chat .linea')]
    lines.forEach(line=>{
        const lineUser=(line.querySelector('.user')?.textContent||'').toLowerCase()
        const lineText=(line.querySelector('.text')?.textContent||'').toLowerCase()
        if((lineUser.includes(q) || lineText.includes(q))){
            line.classList.add('search-match');
            searchResults.push(line)
        }
    })
    searchIndex=0
    if(searchResults.length){
        searchResults[0].classList.add('search-match-current')
        searchResults[0].scrollIntoView({block:'nearest'})
    }
    document.getElementById('search-count').textContent=searchResults.length?`${searchIndex+1}/${searchResults.length}`:'0 resultados'
}
function searchNext() {
    if(!searchResults.length)return
    searchResults[searchIndex].classList.remove('search-match-current')
    searchIndex=(searchIndex+1)%searchResults.length
    searchResults[searchIndex].classList.add('search-match-current')
    searchResults[searchIndex].scrollIntoView({block:'nearest'})
    document.getElementById('search-count').textContent=`${searchIndex+1}/${searchResults.length}`
}

    if(e.key===','&&!inInput){e.preventDefault();window.electronAPI.openSettings();return}

    if(e.key==='Escape'){
        if(searchActive){closeSearch();return}
        if(emoteCtx.classList.contains('open')){closeEmoteCtx();return}
        if(document.getElementById('filter-bar')?.classList.contains('open')){document.getElementById('filter-bar').classList.remove('open');return}
        lpDiv.classList.remove('visible')
        return
    }
    if(e.key==='Enter'&&searchActive&&!inInput){searchNext();return}
    if(e.key==='F3'||((e.key==='g')&&e.ctrlKey)){e.preventDefault();searchNext()}
})

function shouldShowMsg(d) {
    if(!d||!d.user) return false
    if(cfg.hideBots&&KNOWN_BOTS.includes((d.user||'').toLowerCase())) return false
    if(cfg.blockedWordsEnabled&&cfg.blockedWords?.length && cfg.blockedWords.some(w=>(d.text||'').toLowerCase().includes(w))) return false
    if(cfg.filterSubsOnly&&!d.badges?.sub) return false
    if(cfg.filterModsOnly&&!d.badges?.mod) return false
    if(!chipAllowsMsg(d)) return false
    return true
}

function isCustomHighlight(text) {
    if(!cfg.customHighlights?.length) return false
    return cfg.customHighlights.some(w=>(text||'').toLowerCase().includes(w))
}

function crearMsgChat(d,animate=false){
    if(!shouldShowMsg(d)) return null
    const div=document.createElement('div')
    const streamer=cfg.streamerName||''
    const isMention=streamer&&d.text?.toLowerCase().includes(streamer.toLowerCase())
    const isCustom=isCustomHighlight(d.text)
    const bg=nextBg()
    div.className = `linea ${bg} ${d.isFirst ? 'first-chatter' : ''} ${isMention ? 'mention-highlight' : ''} ${isCustom ? 'custom-highlight' : ''}`
    if(animate) div.classList.add('linea-new')
    div.dataset.sub=d.badges?.sub?'true':'false'
    div.dataset.mod=d.badges?.mod?'true':'false'
    const now=new Date(),time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
    const su=esc(d.user),sid=esc(d.userId),sav=esc(d.avatar??''),spl=esc(d.plat),color=getColor(d.user)
    const url=d.plat==='TT'?`https://www.tiktok.com/@${su}`:d.plat==='TW'?`https://www.twitch.tv/${su.toLowerCase()}`:`https://www.youtube.com/channel/${sid}`
    let html=''
    if(cfg.showTimestamps!==false)html+=`<span class="timestamp">${time}</span>`
    html+=`<span class="plat-icon bg-${spl}" title="${spl}"><svg viewBox="0 0 18 18">${platIconSvg(spl)}</svg></span>`
    html+=`<span class="profile-link" data-user="${su}" data-userid="${sid}" data-color="${esc(color)}" data-avatar="${sav}" data-plat="${spl}" data-url="${esc(url)}">`
    if(cfg.avatarShape !== 'none' && d.avatar)html+=`<img src="${sav}" class="avatar" alt="">`
    if(d.badgeUrls?.length){
        d.badgeUrls.forEach(b=>{html+=`<img src="${esc(b.url)}" class="badge-img" title="${esc(b.name)}" alt="${esc(b.name)}">`})
    } else {
        if(d.badges?.mod) html+=`<span class="badge-icon" title="Mod">🛡️</span>`
        if(d.badges?.sub) html+=`<span class="badge-icon" title="Sub">⭐</span>`
    }
    html+=`<span class="user" style="color:${color}">${su}</span></span>`
    html+=`<span class="colon">:</span><span class="text chat-text">${parseEmotes(d.text, d.twitchEmotes, d.plat, d.ytEmotes)}</span>`
    div.setAttribute('data-uid', d.userId||''); div.setAttribute('data-user', d.user||'')
    div.innerHTML=html
    if(d.plat==='TW' && cfg.modHoverMenu!==false) {
        const menu=document.createElement('div'); menu.className='mod-hover-menu'

        div.style.position='relative'; div.appendChild(menu)
    }
    if((isMention||isCustom)&&animate) showToast(`💬 Mención de ${d.user}`,'mention');

}
speechSynthesis.addEventListener('voiceschanged',()=>{ ttsVoiceList=[] })

function speakMsg(d){
    if(!cfg.ttsEnabled || !cfg['tts'+d.plat]) return;
    let textToSpeak = d.text || '';
    if (cfg.ttsNoEmoji !== false) {
        textToSpeak = textToSpeak.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{27BF}]|[\u{1F900}-\u{1F9FF}]/gu, '');
        if (d.plat === 'TW') Object.keys(emoteMap).forEach(e => { textToSpeak = textToSpeak.replace(new RegExp(`\\b${e}\\b`, 'g'), '') });
    }
    const cleanText = textToSpeak.replace(/https?:\/\/\S+/g, 'link').trim();
    const text = cfg.ttsNoName ? cleanText : `${d.user}: ${cleanText}`;
    if(!text) return;
    if(ttsQueue.length>50)ttsQueue.shift();
    ttsQueue.push({text,plat:d.plat,user:d.user});
    if(!ttsBusy) flushTTS();
}
function flushTTS(){
    if(!ttsQueue.length){ttsBusy=false;return}
    ttsBusy=true
    const {text,plat}=ttsQueue.shift()
    const utt=new SpeechSynthesisUtterance(text)
    utt.lang='es-MX'
    utt.volume=Math.min((cfg.soundVolume||60)/100,1)
    const voices=getTTSVoices()
    if(voices.length>0){
        utt.voice=voices[ttsVoiceIdx % voices.length]
        ttsVoiceIdx++;
        utt.rate  = 1 + (ttsVoiceIdx%4/10-0.2) // 0.8, 0.9, 1.0, 1.1
        utt.pitch = 1 + (ttsVoiceIdx%4/10-0.2)
    }
    utt.onend=()=>flushTTS(); utt.onerror=()=>flushTTS();
    speechSynthesis.speak(utt)
}

// ── CHAT INPUT ────────────────────────────────────────────────────────────────
const sentHistory = [], histIdx = -1

async function sendChatMsg(){
    const input=document.getElementById('chat-input-field')
    const plat=document.getElementById('chat-plat-sel')?.value||'TW'
    const text=(input.value||'').trim()
    if(!text) return
    
    sentHistory.unshift(text); if(sentHistory.length > 50) sentHistory.pop(); histIdx = -1;
    input.value=''
    
    try{
        const r = await fetch(`${SERVER}/api/send-message`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,platform:plat,isCommand:text.startsWith('/')&&plat==='TW'})})
        const d = await r.json()
        if(!d.ok) showToast(`⚠ ${d.error||'Error al enviar'}`)
    } catch(e){ showToast('⚠ Sin conexión al servidor') }
}

document.addEventListener('click',e=>{
    const link=e.target.closest('a.chat-link')
    if(link?.dataset.href) window.electronAPI.openExternal(link.dataset.href)
})

function showSkeleton() { document.getElementById('skeleton-overlay').classList.add('visible') }
function hideSkeleton() { document.getElementById('skeleton-overlay').classList.remove('visible') }

// ── INIT ──────────────────────────────────────────────────────────────────────

async function init(){
    showSkeleton()
    try {
        cfg=(await window.electronAPI.getConfig())||{}
        aplicarConfig()
        await cargarEmotes(cfg)
        await checkChangelog()
        startViewerPoll()
    } finally {
        hideSkeleton()
    }
}
init()
