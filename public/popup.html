<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>User</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #18181b; color: #dadada;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            border: 1px solid #2e2e35;
            user-select: none;
        }

        /* Titlebar arrastrable */
        #titlebar {
            height: 32px; background: #111111;
            border-bottom: 1px solid #1e1e24;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 0 8px; flex-shrink: 0;
            -webkit-app-region: drag;
            cursor: move;
        }
        #titlebar-label { font-size: 10px; color: #444; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
        #btn-close-popup {
            -webkit-app-region: no-drag;
            width: 22px; height: 22px; border: none;
            background: transparent; color: #555;
            font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 3px; transition: all 0.15s;
        }
        #btn-close-popup:hover { background: #c42b1c; color: #fff; }

        /* Header con avatar */
        #uc-header {
            padding: 14px 14px 10px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #1e1e24;
        }
        #uc-avatar {
            width: 44px; height: 44px;
            object-fit: cover; border: 1px solid #333;
            border-radius: 2px; flex-shrink: 0;
            background: #111;
        }
        #uc-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        #uc-name {
            font-size: 15px; font-weight: 700;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; cursor: pointer;
            transition: opacity 0.15s;
        }
        #uc-name:hover { opacity: 0.7; text-decoration: underline; }
        #uc-plat { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        #uc-count { font-size: 10px; color: #444; margin-top: 1px; }

        /* Historial */
        #hist-label { font-size: 9px; color: #444; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; padding: 8px 14px 4px; }
        #uc-history {
            flex: 1; overflow-y: auto;
            padding: 0 14px 8px;
            display: flex; flex-direction: column; gap: 3px;
            min-height: 0;
        }
        #uc-history::-webkit-scrollbar { width: 3px; }
        #uc-history::-webkit-scrollbar-thumb { background: #2e2e35; }

        .hist-sep { font-size: 9px; color: #333; text-align: center; padding: 2px 0; border-top: 1px solid #1e1e24; margin: 4px 0 2px; }
        .hist-msg { font-size: 11.5px; color: #aaa; line-height: 1.5; border-left: 2px solid #2e2e35; padding-left: 6px; }
        .hist-msg.dim { opacity: 0.4; }

        /* Acciones */
        #uc-actions {
            border-top: 1px solid #1e1e24;
            padding: 8px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .uc-btn {
            background: #111115; color: #aaa;
            border: 1px solid #1e1e24; padding: 6px 10px;
            cursor: pointer; font-size: 11.5px; font-weight: 600;
            text-align: left; border-radius: 3px;
            transition: all 0.15s; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
        }
        .uc-btn:hover { background: #1e1e24; color: #fff; border-color: #333; }
        .uc-btn-mod:hover { background: #2a0f0f; color: #ff6b6b; border-color: #ff3333; }
    </style>
</head>
<body>
    <div id="titlebar">
        <div id="titlebar-label">Usuario</div>
        <button id="btn-close-popup" onclick="window.close()">✕</button>
    </div>

    <div id="uc-header">
        <img id="uc-avatar" src="" alt="">
        <div id="uc-info">
            <div id="uc-name">—</div>
            <div id="uc-plat">—</div>
            <div id="uc-count"></div>
        </div>
    </div>

    <div id="hist-label">Historial</div>
    <div id="uc-history"><i style="color:#333;font-size:11px">Cargando...</i></div>

    <div id="uc-actions">
        <button class="uc-btn" id="btn-profile">👤 Ver perfil</button>
        <button class="uc-btn uc-btn-mod" onclick="alert('Timeout no implementado aún.')">⏱️ Timeout</button>
        <button class="uc-btn uc-btn-mod" onclick="alert('Ban no implementado aún.')">🔨 Ban</button>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        let profileUrl = ''

        async function init() {
            const data = await window.electronAPI.getPopupData()
            if (!data) return

            profileUrl = data.url || ''

            // Avatar
            const av = document.getElementById('uc-avatar')
            if (data.avatar) { av.src = data.avatar }
            else             { av.style.display = 'none' }

            // Nombre y color
            const nameEl = document.getElementById('uc-name')
            nameEl.textContent = data.user
            nameEl.style.color = data.color || '#dadada'
            nameEl.onclick     = () => { if (profileUrl) window.electronAPI.openExternal?.(profileUrl) }

            // Plataforma
            document.getElementById('uc-plat').textContent =
                data.plat === 'TT' ? '⬛ TikTok' :
                data.plat === 'YT' ? '🔴 YouTube' :
                data.plat === 'TW' ? '💜 Twitch' : data.plat

            // Botón perfil: abrir en el navegador del sistema, no dentro de Electron
            document.getElementById('btn-profile').onclick = () => {
                if (profileUrl) window.electronAPI?.openExternal(profileUrl)
            }

            // Historial via Socket.IO (script debe cargar desde URL absoluta porque popup es file://)
            const c = document.getElementById('uc-history')
            function setHistState(html) {
                c.innerHTML = html
            }
            try {
                const socket = io('http://localhost:3000', { reconnection: false })
                socket.on('connect_error', () => {
                    setHistState('<i style="color:#555;font-size:11px">Sin conexión al servidor</i>')
                })
                socket.emit('req_user_hist', data.userId)
                socket.on('res_user_hist', res => {
                    if (res.uid !== data.userId) return
                    c.innerHTML = ''
                    const total = (res.h && res.h.prev && res.h.curr) ? (res.h.prev.length + res.h.curr.length) : 0
                    if (!total) {
                        setHistState('<i style="color:#333;font-size:11px">Sin mensajes registrados</i>')
                        return
                    }

                    document.getElementById('uc-count').textContent = `${total} mensaje${total !== 1 ? 's' : ''}`

                    const addSec = (msgs, label, dim) => {
                        if (!msgs.length) return
                        const sep = document.createElement('div')
                        sep.className = 'hist-sep'
                        sep.textContent = label
                        c.appendChild(sep)
                        msgs.forEach(m => {
                            const el = document.createElement('div')
                            el.className = `hist-msg${dim ? ' dim' : ''}`
                            el.textContent = m
                            c.appendChild(el)
                        })
                    }
                    addSec(res.h.prev, '— Anterior —', true)
                    addSec(res.h.curr, '— Actual —',   false)
                    c.scrollTop = c.scrollHeight
                })
                // Si no llega respuesta en 5 s, salir de "Cargando..."
                setTimeout(() => {
                    if (c.innerHTML === '<i style="color:#333;font-size:11px">Cargando...</i>') {
                        setHistState('<i style="color:#555;font-size:11px">Sin mensajes registrados</i>')
                    }
                }, 5000)
            } catch (e) {
                console.error('Socket error:', e)
                setHistState('<i style="color:#555;font-size:11px">Error al cargar historial</i>')
            }
        }

        init()
    </script>
</body>
</html>
