<!DOCTYPE html>
<html lang="es" class="win-setup">
<head>
    <meta charset="utf-8">
    <title>Chattering — Configuración inicial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="titlebar">
        <div id="titlebar-title">Chattering</div>
        <div id="titlebar-controls">
            <button class="win-btn" onclick="window.electronAPI.minimize()">─</button>
            <button class="win-btn" onclick="window.electronAPI.close()">✕</button>
        </div>
    </div>

    <div id="content" style="padding: 30px;">
        <div class="logo">Chatter<span>ing</span></div>
        <div class="subtitle" style="margin-bottom: 25px;">Conecta tus plataformas favoritas con un solo clic. Detectaremos tu usuario automáticamente.</div>

       <!-- TIKTOK -->
        <div class="section" style="margin-bottom: 20px;">
            <div class="section-title">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="vertical-align: middle; margin-right: 4px;"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm6.1 7.6a4.7 4.7 0 01-2.7-.9v4a4.1 4.1 0 11-3.5-4.1h.4v2.2a2 2 0 101.5 1.9V6.9h2.1a2.6 2.6 0 002.2 2.2z"/></svg> TikTok
            </div>
            <div style="position:relative; margin-bottom: 8px;">
                <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#888;font-size:13px;pointer-events:none">@</span>
                <input class="input-field" id="setup-tt" placeholder="Se detectará automáticamente" type="text" style="padding-left:22px; width: 100%;" readonly>
            </div>
            <button class="btn-twitch-oauth" id="btn-tt-login" onclick="loginTiktokSeamlessSetup()" style="background: #111111; border: 1px solid #333; color: white;">
                <span id="tt-btn-label">🔗 Vincular cuenta de TikTok</span>
            </button>
        </div>

        <!-- YOUTUBE -->
        <div class="section" style="margin-bottom: 20px;">
            <div class="section-title">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="#FF0000" style="vertical-align: middle; margin-right: 4px;"><path d="M23.5 6.5a3 3 0 00-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4a3 3 0 00-2.1 2.1C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 002.1 2.1c1.9.4 9.4.4 9.4.4s7.5 0 9.4-.4a3 3 0 002.1-2.1c.5-1.9.5-5.5.5-5.5s0-3.6-.5-5.5z"/><path d="M9.5 15.5l6.3-3.5-6.3-3.5v7z" fill="#fff"/></svg> YouTube
            </div>
            <div style="position:relative">
                <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#888;font-size:13px;pointer-events:none">@</span>
                <input class="input-field" id="yt-channel" placeholder="Tu handle (ej: lofi_girl)" type="text" style="padding-left:22px; width: 100%;">
            </div>
        </div>

        <!-- TWITCH -->
        <div class="section" style="margin-bottom: 30px;">
            <div class="section-title">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="#9146FF" style="vertical-align: middle; margin-right: 4px;"><path d="M4.3 2L2 6v16h5.3v4h2.9l4-4h4.7l6.3-6.3V2zm17.7 13l-3.6 3.6h-6.1l-3.2 3.2v-3.2H5V4h17zM16 8v6h-2V8zm-5.3 0v6h-2V8z"/></svg> Twitch
            </div>
            <input type="hidden" id="tw-user">
            <input type="hidden" id="tw-token">
            <button class="btn-twitch-oauth" onclick="loginTwitchSetup()" id="tw-oauth-btn">
                Conectar con Twitch
            </button>
        </div>

        <button class="btn-start" onclick="guardarYContinuar()" id="btn-start">Guardar y Empezar →</button>
        <div class="skip" onclick="guardarYContinuar(true)">Saltar y configurar después</div>
    </div>

    <script>
        let tempTiktokSessionId = null;

        async function loginTiktokSeamlessSetup() {
            const btn = document.getElementById('btn-tt-login');
            const lbl = document.getElementById('tt-btn-label');
            const ttInput = document.getElementById('setup-tt');
            
            btn.disabled = true;
            lbl.textContent = 'Abriendo ventana...';
            
            try {
                const res = await window.electronAPI.loginTiktok();
                if (res.success && res.sessionId) {
                    tempTiktokSessionId = res.sessionId; // Guardar en memoria
                    const username = res.username;
                    
                    if (username) {
                        ttInput.value = username;
                        lbl.textContent = '✓ TikTok: @' + username;
                        btn.style.background = '#1a4a1a';
                        btn.style.borderColor = '#53fc18';
                        btn.style.color = '#53fc18';
                    } else {
                        lbl.textContent = '⚠️ Sesión lista. Escribe tu usuario arriba.';
                        btn.style.borderColor = '#ffcc00';
                        ttInput.removeAttribute('readonly');
                        ttInput.focus();
                    }
                } else { 
                    lbl.textContent = '🔗 Vincular cuenta de TikTok'; 
                    alert("Error al vincular: " + (res.error || "Ventana cerrada"));
                }
            } catch (e) { 
                lbl.textContent = '🔗 Vincular cuenta de TikTok'; 
                alert("Error interno: " + e.message);
            }
            btn.disabled = false;
        }

        async function loginTwitchSetup() {
            const btn = document.getElementById('tw-oauth-btn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Autoriza en el navegador...';
            try {
                await window.electronAPI.loginTwitch();
                let done = false;
                const poll = setInterval(async () => {
                    if (done) return;
                    try {
                        const r = await fetch('http://localhost:3000/api/twitch/auth-status');
                        const d = await r.json();
                        if (d.ok && d.login) {
                            done = true; clearInterval(poll);
                            document.getElementById('tw-token').value = d.token || '';
                            document.getElementById('tw-user').value = d.login;
                            btn.className = 'btn-twitch-oauth connected';
                            btn.innerHTML = '✓ Twitch: ' + d.login;
                        }
                    } catch (err) {
                        console.warn("Esperando al servidor local...", err.message);
                    }
                }, 1500);
            } catch(e) {
                console.error("Error Twitch:", e);
                alert("Error al abrir Twitch: " + e.message);
                btn.innerHTML = 'Conectar con Twitch';
            }
            btn.disabled = false;
        }

        async function guardarYContinuar(skip = false) {
            const btn = document.getElementById('btn-start');
            btn.textContent = 'Iniciando...';
            btn.disabled = true;

            const ttUser = document.getElementById('setup-tt').value.trim();
            const twUser = document.getElementById('tw-user').value.trim();
            const currentCfg = await window.electronAPI.getConfig() || {};
            
            const config = {
                ...currentCfg,
                tiktokSessionId:  tempTiktokSessionId || currentCfg.tiktokSessionId,
                tiktokUser:       skip ? '' : ttUser,
                youtubeChannelId: skip ? '' : document.getElementById('yt-channel').value.trim().replace('@', ''),
                twitchUser:       skip ? '' : twUser,
                twitchToken:      skip ? '' : document.getElementById('tw-token').value.trim(),
                streamerName:     twUser || ttUser || '',
                fontSize: 13.5, showTimestamps: true, showFollows: true, showGifts: true, showLikes: true
            };
            
            await window.electronAPI.saveConfig(config);
            window.electronAPI.setupComplete(); 
        }
    </script>
</body>
</html>
